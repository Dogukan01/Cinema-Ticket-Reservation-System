version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: sbrs-postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_secure_password_here
      POSTGRES_DB: sbrs_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sbrs-redis-cache
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
